<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Crime Composition Over Time</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #ffffff;
        }
        #plot {
            width: 100%;
            height: 620px;
        }
    </style>
</head>
<body>

<div id="plot"></div>

<script>
const teal = "#264653";
const green = "#2A9D8F";
const coral = "#E07A5F";
const slate = "#8D99AE";

const data = [
    {
        x: [2018, 2019, 2020, 2021, 2022, 2023],
        y: [8474, 5659, 8662, 8307, 6867, 5800],
        type: 'scatter',
        mode: 'lines',
        name: 'Burglary',
        stackgroup: 'one',
        line: {color: teal}
    },
    {
        x: [2018, 2019, 2020, 2021, 2022, 2023],
        y: [5696, 4796, 3774, 3471, 4764, 4761],
        type: 'scatter',
        mode: 'lines',
        name: 'Fraud',
        stackgroup: 'one',
        line: {color: green}
    },
    {
        x: [2018, 2019, 2020, 2021, 2022, 2023],
        y: [11548, 9748, 11601, 6171, 7060, 7716],
        type: 'scatter',
        mode: 'lines',
        name: 'Assault',
        stackgroup: 'one',
        line: {color: coral}
    },
    {
        x: [2018, 2019, 2020, 2021, 2022, 2023],
        y: [2902, 3233, 323, 380, 337, 354],
        type: 'scatter',
        mode: 'lines',
        name: 'Vandalism',
        stackgroup: 'one',
        line: {color: slate}
    }
];

const layout = {
    title: {
        text: "How Crime Composition Changed After COVID-19",
        x: 0.5
    },
    xaxis: {title: "Year"},
    yaxis: {title: "Total Incidents"},
    hovermode: "x unified",
    plot_bgcolor: "#f3f5f7",
    paper_bgcolor: "#ffffff",
    font: {
        family: "Helvetica Neue, Helvetica, Arial",
        color: "#333"
    },
    shapes: [
        {
            type: "line",
            x0: 2020,
            x1: 2020,
            y0: 0,
            y1: 1,
            xref: "x",
            yref: "paper",
            line: {
                color: "#2A9D8F",
                width: 2,
                dash: "dash"
            }
        }
    ],
    annotations: [
        {
            x: 2020,
            y: 1.05,
            xref: "x",
            yref: "paper",
            text: "Pandemic Begins",
            showarrow: false,
            font: {color: "#2A9D8F"}
        }
    ]
};

Plotly.newPlot('plot', data, layout, {responsive: true});
</script>

</body>
</html>
